<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Maddie Stanford is an event professional and florist creating elevated, botanical-forward experiences."
    />
    <meta name="theme-color" content="#8a2226" />
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const route = params.get("route");

        if (!route) {
          return;
        }

        const search = params.get("search");
        const hash = params.get("hash");
        const basePath = window.location.pathname.replace(/\/$/, "");
        let nextUrl = `${basePath}${route.startsWith("/") ? route : `/${route}`}`;

        if (search) {
          nextUrl += `?${search}`;
        }

        if (hash) {
          nextUrl += `#${hash}`;
        }

        window.history.replaceState(null, "", nextUrl);
      })();

      const themeColorMeta = document.querySelector('meta[name="theme-color"]');

      if (themeColorMeta) {
        themeColorMeta.setAttribute("content", "#8a2226");
      }
    </script>
    <title>Maddie Stanford</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
